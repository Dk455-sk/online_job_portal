{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Employer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:system-ui;
background:#f3f4f6;
overflow-x:hidden;
}

/* ================= SIDEBAR ================= */

.sidebar{

position:fixed;
top:0;
left:0;
width:240px;
height:100%;
background:#111827;
color:white;
padding-top:15px;
transition:.35s;
z-index:1000;

}

.sidebar h4{

text-align:center;
padding:18px;
border-bottom:1px solid rgba(255,255,255,.1);
font-weight:600;

}

.sidebar a{

display:flex;
align-items:center;
gap:10px;
padding:14px 22px;
text-decoration:none;
color:#d1d5db;
font-size:15px;
transition:.25s;

}

.sidebar a:hover{

background:#1f2937;
color:white;

}

/* ================= MAIN ================= */

.main{

margin-left:240px;
padding:25px;
transition:.35s;

}

/* ================= TOPBAR ================= */

.topbar{

background:white;
padding:12px 20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
margin-bottom:20px;

display:none;
justify-content:space-between;
align-items:center;

}

.toggle-btn{

font-size:22px;
cursor:pointer;

}

/* ================= OVERLAY ================= */

.overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
display:none;
z-index:900;

}

.overlay.show{

display:block;

}

/* ================= MOBILE ================= */

@media(max-width:992px){

.sidebar{

left:-240px;

}

.sidebar.show{

left:0;

}

.main{

margin-left:0;

}

.topbar{

display:flex;

}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h4>Employer Panel</h4>

<a href="{% url 'employer_dashboard' %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="{% url 'jobpost' %}">
<i class="bi bi-plus-circle"></i> Post Job
</a>

<a href="{% url 'Job_list' %}">
<i class="bi bi-briefcase"></i> Manage Jobs
</a>

<a href="{% url 'employer_applications' %}">
<i class="bi bi-people"></i> Applicants
</a>

<a href="#">
<i class="bi bi-bar-chart"></i> Reports
</a>

<a href="{% url 'empprofile' %}">
<i class="bi bi-building"></i> Company Profile
</a>

<a href="{% url 'logout' %}" class="text-danger">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay"></div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- MOBILE TOPBAR -->

<div class="topbar">

<span class="toggle-btn" id="menuBtn">
<i class="bi bi-list"></i>
</span>

<div>
<i class="bi bi-person-circle"></i> {{ ename|title }}
</div>

</div>

<!-- PAGE CONTENT -->

{% block content %}

{% endblock %}

</div>

<script>

const sidebar = document.getElementById("sidebar")
const overlay = document.getElementById("overlay")
const menuBtn = document.getElementById("menuBtn")

menuBtn.onclick = () => {

sidebar.classList.toggle("show")
overlay.classList.toggle("show")

}

overlay.onclick = () => {

sidebar.classList.remove("show")
overlay.classList.remove("show")

}

/* auto close sidebar on mobile when clicking link */

document.querySelectorAll(".sidebar a").forEach(link => {

link.addEventListener("click",()=>{

if(window.innerWidth < 992){

sidebar.classList.remove("show")
overlay.classList.remove("show")

}

})

})

</script>

</body>
</html>
