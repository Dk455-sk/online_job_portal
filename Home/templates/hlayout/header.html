{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobX Navbar</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Navbar */
.navbar{
padding:10px 0;
}

/* Logo */
.nav-logo{
height:40px;
width:auto;
}

/* Nav links */
.nav-link{
font-weight:500;
margin-right:10px;
transition:0.3s;
}

.nav-link:hover{
color:#ffc107 !important;
}

/* Auth buttons */
.auth-buttons{
display:flex;
gap:10px;
}

/* Login button */
.login-btn{
border:1px solid white;
color:white;
padding:6px 16px;
border-radius:20px;
transition:0.3s;
}

.login-btn:hover{
background:white;
color:black;
}

/* Signup button */
.signup-btn{
background:#ffc107;
color:black;
padding:6px 18px;
border-radius:20px;
font-weight:600;
transition:0.3s;
}

.signup-btn:hover{
background:#ffb300;
}

/* Mobile design */
@media (max-width:991px){

.auth-buttons{
flex-direction:column;
margin-top:10px;
}

.login-btn,
.signup-btn{
width:100%;
text-align:center;
}

}

</style>

</head>
<body>


<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">

<div class="container">

<!-- Logo -->
<a class="navbar-brand d-flex align-items-center" href="#">
<img src="{% static 'images/logo5.png' %}" class="nav-logo">
</a>

<!-- Mobile Button -->
<button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
<span class="navbar-toggler-icon"></span>
</button>

<!-- Menu -->
<div class="collapse navbar-collapse mt-3 mt-lg-0" id="mainNav">

<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link active" href="{% url 'home' %}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Contact</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">FAQs</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">About</a>
</li>

</ul>

<!-- Buttons -->
<div class="auth-buttons">

<a href="{%url 'login'%}" class="btn login-btn">Login</a>

<a href="{% url 'register' %}" class="btn signup-btn">Sign Up</a>

</div>

</div>

</div>

</nav>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
