<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* DEFAULT (DESKTOP + TABLET) */

body{
background:linear-gradient(135deg,#0d6efd,#6610f2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui;
}

/* REGISTER CARD */

.register-card{
background:white;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
max-width:480px;
width:100%;
padding:35px;
}

/* TITLE */

.register-title{
font-weight:700;
text-align:center;
margin-bottom:25px;
color:#0d6efd;
}

/* FORM */

form input,
form select,
form textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:12px;
}

/* BUTTON */

.register-btn{
border-radius:8px;
font-weight:600;
padding:10px;
}

/* MOBILE VERSION */

@media(max-width:768px){

body{
background:#ffffff;
display:block;
padding:20px;
}

.register-card{
box-shadow:none;
border-radius:0;
max-width:90%;
padding:10px;
}

.register-title{
color:#000;
}

}

</style>

</head>

<body>

<div class="register-card">

<h3 class="register-title">
Create Account
</h3>

<form method="post">

{% csrf_token %}

<!-- Django Form -->

{{ form.as_p }}

<!-- Message -->

{% if msg %}

<div class="alert alert-info text-center">
{{ msg }}
</div>
{% endif %}

<div class="d-grid mt-3">

<button type="submit" name="btn" class="btn btn-success register-btn">
Register
</button>

</div>

<div class="text-center mt-3">

Already have an account?

<a href="{% url 'login' %}" class="fw-bold text-primary">
Login
</a>

</div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
