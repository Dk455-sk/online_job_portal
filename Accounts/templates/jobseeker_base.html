{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Job Seeker Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
margin:0;
font-family:system-ui;
overflow-x:hidden;
}

/* =======================
SIDEBAR
======================= */

.sidebar{

position:fixed;
top:0;
left:0;
height:100%;
width:240px;
background:#1e3a8a;
color:white;
transition:all .3s ease;
z-index:1000;

}

.sidebar h4{

text-align:center;
padding:20px;
border-bottom:1px solid rgba(255,255,255,0.2);

}

.sidebar a{

display:block;
color:#d1d5db;
padding:14px 20px;
text-decoration:none;
font-size:15px;
transition:.2s;

}

.sidebar a:hover{

background:#1e40af;
color:white;

}

.sidebar i{

margin-right:8px;

}

/* =======================
MAIN CONTENT
======================= */

.main{

margin-left:240px;
padding:25px;
transition:.3s;

}

/* =======================
TOPBAR
======================= */

.topbar{

background:white;
padding:12px 20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
margin-bottom:20px;
display:none;
justify-content:space-between;
align-items:center;

}

.toggle-btn{

font-size:22px;
cursor:pointer;

}

/* =======================
OVERLAY
======================= */

.overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:900;

}

.overlay.active{

display:block;

}

/* =======================
MOBILE VIEW
======================= */

@media(max-width:992px){

.sidebar{

left:-240px;

}

.sidebar.active{

left:0;

}

.main{

margin-left:0;

}

.topbar{

display:flex;

}

}

</style>

</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h4>JobSeeker Panel</h4>

<a href="{% url 'jobseeker_dashboard' %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="{% url 'applyjob_list' %}">
<i class="bi bi-search"></i> Search Jobs
</a>

<a href="{% url 'jobseeker_applications' %}">
<i class="bi bi-briefcase"></i> My Applications
</a>

<a href="{% url 'saved_jobs' %}">
<i class="bi bi-bookmark"></i> Saved Jobs
</a>

<a href="{% url 'jobseeker_profile' %}">
<i class="bi bi-person"></i> My Profile
</a>

<a href="{% url 'logout' %}" class="text-danger">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>


<!-- MAIN CONTENT -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<span class="toggle-btn" onclick="toggleSidebar()">
<i class="bi bi-list"></i>
</span>

<div>

<span class="text-muted">
<i class="bi bi-person-circle"></i> {{ jname|title }}
</span>

</div>

</div>


<!-- PAGE CONTENT -->

{% block content %}

{% endblock %}

</div>


<script>

function toggleSidebar(){

let sidebar = document.getElementById("sidebar")
let overlay = document.getElementById("overlay")

sidebar.classList.toggle("active")
overlay.classList.toggle("active")

}

function closeSidebar(){

let sidebar = document.getElementById("sidebar")
let overlay = document.getElementById("overlay")

sidebar.classList.remove("active")
overlay.classList.remove("active")

}

/* Auto close sidebar when menu clicked (mobile) */

let links = document.querySelectorAll(".sidebar a")

links.forEach(link => {

link.addEventListener("click", () => {

if(window.innerWidth < 992){

closeSidebar()

}

})

})

</script>


</body>

</html>
