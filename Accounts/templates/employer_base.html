{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Employer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
margin:0;
font-family:system-ui;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100vh;
background:#060ef1;
color:white;
transition:0.3s;
z-index:1000;
}

.sidebar h4{
text-align:center;
padding:20px;
border-bottom:1px solid #374151;
}

.sidebar a{
display:block;
color:#d1d5db;
padding:14px 20px;
text-decoration:none;
font-size:15px;
transition:0.2s;
}

.sidebar a:hover{
background:#1f2937;
color:white;
}

.sidebar a i{
margin-right:8px;
}

/* MAIN CONTENT */

.main{
margin-left:240px;
padding:25px;
transition:0.3s;
}

/* TOPBAR */

.topbar{
background:#5258fa;
padding:12px 20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.toggle-btn{
font-size:20px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:992px){

.sidebar{
left:-240px;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h4>Employer Panel</h4>

<a href="{% url 'employer_dashboard' %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="{% url 'jobpost' %}">
<i class="bi bi-plus-circle"></i> Post Job
</a>

<a href="{% url 'Job_list' %}">
<i class="bi bi-briefcase"></i> Manage Jobs
</a>

<a href="{% url 'employer_applications' %}">
<i class="bi bi-people"></i> Applicants
</a>

<a href="#">
<i class="bi bi-bar-chart"></i> Reports
</a>

<a href="{% url 'empprofile' %}">
<i class="bi bi-building"></i> Company Profile
</a>

<a href="{% url 'logout' %}" class="text-danger">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<span class="toggle-btn" onclick="toggleSidebar()">
<i class="bi bi-list"></i>
</span>

<div>
<i class="bi bi-person-circle"></i>
{{ ename|title }}
</div>

</div>

<!-- PAGE CONTENT -->

{% block content %}

{% endblock %}

</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active")
}

</script>

</body>
</html>
