{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Job Seeker Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
margin:0;
font-family:system-ui;
}

/* ===== SIDEBAR ===== */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:240px;
background:#060ef1;
color:white;
transition:0.3s;
z-index:1000;
}

.sidebar h4{
text-align:center;
padding:20px;
border-bottom:1px solid #374151;
}

.sidebar a{
display:block;
color:#d1d5db;
padding:14px 20px;
text-decoration:none;
font-size:15px;
transition:0.2s;
}

.sidebar a:hover{
background:#1f2937;
color:white;
}

.sidebar a i{
margin-right:8px;
}

/* ===== MAIN AREA ===== */

.main{
margin-left:240px;
padding:25px;
transition:0.3s;
}

/* ===== TOP NAVBAR ===== */

.topbar{
background:#5258fa;
padding:10px 20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.toggle-btn{
font-size:2opx;
cursor:pointer;
}

/* ===== MOBILE VIEW ===== */

@media(max-width:992px){

.sidebar{
left:-240px;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
}

}

</style>

</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h4>JobSeeker Panel</h4>

<a href="{% url 'jobseeker_dashboard' %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="{% url 'applyjob_list' %}">
<i class="bi bi-search"></i> Search Jobs
</a>

<a href="{% url 'jobseeker_applications' %}">
<i class="bi bi-briefcase"></i> My Applications
</a>

<a href="{% url 'saved_jobs' %}">
<i class="bi bi-bookmark"></i> Saved Jobs
</a>

<a href="{% url 'jobseeker_profile' %}">
<i class="bi bi-person"></i> My Profile
</a>

<a href="{% url 'logout' %}" class="text-danger">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<!-- TOP BAR -->

<div class="topbar">

<span class="toggle-btn" onclick="toggleSidebar()">
<i class="bi bi-list"></i>
</span>

<div>

<span class="text-muted me-3">
<i class="bi bi-person-circle"></i>{{ jname|title }}
</span>

</div>

</div>


<!-- PAGE CONTENT -->

{% block content %}

{% endblock %}

</div>


<script>

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active")

}

</script>


</body>

</html>
